<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عد تنازلي لعيد الميلاد</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alyamama:wght@300..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="countdown-container">
        <h1>فاضل كام على عيد الميلاد؟ 🎂</h1>
        
        <!-- العداد الرئيسي -->
        <div class="countdown-timer">
            <div class="time-box">
                <span id="days">00</span>
                <p>أيام</p>
            </div>
            <div class="time-box">
                <span id="hours">00</span>
                <p>ساعات</p>
            </div>
            <div class="time-box">
                <span id="minutes">00</span>
                <p>دقائق</p>
            </div>
            <div class="time-box">
                <span id="seconds">00</span>
                <p>ثواني</p>
            </div>
        </div>
        
        <h2 id="celebrate-message" style="display: none;">كل سنة وأنت طيب! 🎉🎈</h2>
    </div>

    <script src="script.js"></script>
</body>

</html>
